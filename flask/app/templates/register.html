{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h3 class="card-title mb-4 text-center">Request an Account</h3>
        <p class="text-muted text-center mb-4">
          <small>Account requests are reviewed by an administrator before access is granted.</small>
        </p>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
          <div class="row mb-3">
            <div class="col">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" name="first_name" required>
            </div>
            <div class="col">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" name="last_name" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">UW Email</label>
            <input type="email" class="form-control" name="email" placeholder="netid@uw.edu" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Submit Request</button>
          </div>
        </form>

        <hr>
        <p class="text-center mb-0">
          <small>Already have an account? <a href="/login">Sign in</a></small>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
