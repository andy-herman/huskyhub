services:

  huskyhub-nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./flask/app/static:/var/www/html/static
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/login"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - huskyhub-flask

  huskyhub-flask:
    build:
      context: .
      dockerfile: ./flask/Dockerfile
    environment:
      DB_HOST: huskyhub-db
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      FLASK_ENV: development
      FLASK_DEBUG: 1
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-huskyhub-2024}
    volumes:
      - ./flask/app/uploads:/app/app/uploads
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      huskyhub-db:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway

  huskyhub-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysqldata:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  huskyhub-ollama:
    image: ollama/ollama:latest
    profiles:
      - ai
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

volumes:
  mysqldata:
  ollamadata:
